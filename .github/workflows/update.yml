name: Update
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - << 'EOF'
          import json, urllib.request, datetime

          FR={"France":"France","Senegal":"Senegal","Haiti":"Haiti","Paraguay":"Paraguay","Mexico":"Mexique","South Africa":"Afr. Sud","South Korea":"Coree S.","Czech Republic":"Tcheque","Canada":"Canada","Switzerland":"Suisse","Bosnia and Herzegovina":"Bosnie","Qatar":"Qatar","Brazil":"Bresil","Morocco":"Maroc","Scotland":"Ecosse","United States":"Etats-Unis","Australia":"Australie","Turkiye":"Turquie","Germany":"Allemagne","Cote d'Ivoire":"Cote Ivoire","Ivory Coast":"Cote Ivoire","Ecuador":"Equateur","Curacao":"Curacao","Netherlands":"Pays-Bas","Japan":"Japon","Sweden":"Suede","Tunisia":"Tunisie","Egypt":"Egypte","Iran":"Iran","Belgium":"Belgique","New Zealand":"N-Zelande","Spain":"Espagne","Uruguay":"Uruguay","Cape Verde":"Cap-Vert","Saudi Arabia":"Arabie Sao.","Norway":"Norvege","Iraq":"Iraq","Argentina":"Argentine","Austria":"Autriche","Algeria":"Algerie","Jordan":"Jordanie","Colombia":"Colombie","Portugal":"Portugal","DR Congo":"Congo RD","Uzbekistan":"Ouzbekistan","England":"Angleterre","Ghana":"Ghana","Croatia":"Croatie","Panama":"Panama","Korea Republic":"Coree S."}

          PHASE_FR = {
              "group-stage": "Groupes",
              "round-of-32": "16es de finale",
              "round-of-16": "8es de finale",
              "quarterfinals": "Quarts de finale",
              "semifinals": "Demi-finales",
              "third-place": "Petite finale",
              "final": "Finale"
          }

          def fetch_url(url):
              req = urllib.request.Request(url, headers={"User-Agent":"Mozilla/5.0"})
              r = urllib.request.urlopen(req, timeout=15)
              return json.loads(r.read())

          # Toutes les dates du tournoi: 11 juin au 19 juillet 2026
          start_date = datetime.date(2026, 6, 11)
          end_date = datetime.date(2026, 7, 19)
          all_events = []
          seen_ids = set()

          current = start_date
          while current <= end_date:
              date_str = current.strftime("%Y%m%d")
              try:
                  url = f"https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates={date_str}&limit=20"
                  data = fetch_url(url)
                  events = data.get("events", [])
                  for e in events:
                      eid = e.get("id")
                      if eid not in seen_ids:
                          seen_ids.add(eid)
                          all_events.append(e)
              except Exception as ex:
                  pass
              current += datetime.timedelta(days=1)

          print(f"ESPN total: {len(all_events)} matchs uniques")

          games = []
          sm = {}

          for e in all_events:
              comp = e.get("competitions", [{}])[0]
              competitors = comp.get("competitors", [])
              if len(competitors) < 2:
                  continue

              home = next((c for c in competitors if c.get("homeAway")=="home"), competitors[0])
              away = next((c for c in competitors if c.get("homeAway")=="away"), competitors[1])
              hN = home.get("team",{}).get("displayName","")
              aN = away.get("team",{}).get("displayName","")
              hA = home.get("team",{}).get("abbreviation","")
              aA = away.get("team",{}).get("abbreviation","")

              # Phase du match
              slug = e.get("season",{}).get("slug","")

              # Groupe (phase de groupes uniquement)
              note = comp.get("altGameNote","")
              grp = ""
              if "Group" in note:
                  grp = note.split("Group ")[-1].strip()[:1]
                  if not grp.isalpha():
                      grp = ""

              # Phase lisible
              phase = PHASE_FR.get(slug, slug)

              # Statut
              status_obj = comp.get("status",{}).get("type",{})
              state = status_obj.get("state","")
              completed = status_obj.get("completed", False)
              if completed or state == "post":
                  status = "final"
              elif state == "in":
                  status = "in_progress"
              else:
                  status = "scheduled"

              sH = int(home.get("score","0") or 0) if status != "scheduled" else 0
              sA = int(away.get("score","0") or 0) if status != "scheduled" else 0
              start = e.get("date","")
              clock = comp.get("status",{}).get("displayClock","")
              el = clock if status == "in_progress" else ""

              hFR = FR.get(hN, hN)
              aFR = FR.get(aN, aN)

              games.append({
                  "id": e.get("id",""),
                  "status": status,
                  "start": start,
                  "home": hA,
                  "away": aA,
                  "homeN": hFR,
                  "awayN": aFR,
                  "group": grp,
                  "phase": phase,
                  "scoreH": sH,
                  "scoreA": sA,
                  "elapsed": el
              })

              # Classements phase de groupes uniquement
              if grp:
                  if grp not in sm:
                      sm[grp] = {}
                  for name, abb, frname in [(hN,hA,hFR),(aN,aA,aFR)]:
                      if abb not in sm[grp]:
                          sm[grp][abb] = {"a":abb,"n":frname,"g":grp,"j":0,"v":0,"nul":0,"d":0,"pts":0}
                  if status == "final":
                      sm[grp][hA]["j"]+=1; sm[grp][aA]["j"]+=1
                      if sH>sA: sm[grp][hA]["v"]+=1; sm[grp][hA]["pts"]+=3; sm[grp][aA]["d"]+=1
                      elif sA>sH: sm[grp][aA]["v"]+=1; sm[grp][aA]["pts"]+=3; sm[grp][hA]["d"]+=1
                      else: sm[grp][hA]["nul"]+=1; sm[grp][hA]["pts"]+=1; sm[grp][aA]["nul"]+=1; sm[grp][aA]["pts"]+=1

          st = []
          for grp in sorted(sm.keys()):
              ts = sorted(sm[grp].values(), key=lambda x:-x["pts"])
              for i,t in enumerate(ts):
                  t["r"]=i+1; st.append(t)

          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          live = [g for g in games if g["status"]=="in_progress"]
          grp_games = [g for g in games if g["group"]]
          ko_games = [g for g in games if not g["group"]]
          out = {"updated":now,"source":"ESPN","games":games,"standings":st}
          with open("worldcup.json","w",encoding="utf-8") as f:
              json.dump(out,f,ensure_ascii=False)
          print(f"OK: {len(grp_games)} matchs groupe + {len(ko_games)} eliminatoires, {len(live)} en cours")
          EOF
      - run: |
          git config user.name bot
          git config user.email bot@bot.com
          git add worldcup.json
          git diff --staged --quiet || (git commit -m "update $(date -u +%H:%M)" && git push)
