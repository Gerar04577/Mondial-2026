name: Update
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - << 'EOF'
          import json,urllib.request,datetime
          FR={"Mexico":"Mexique","South Africa":"Afr. Sud","South Korea":"Coree S.","Czechia":"Tcheque","Canada":"Canada","Switzerland":"Suisse","Bosnia and Herzegovina":"Bosnie","Qatar":"Qatar","Brazil":"Bresil","Morocco":"Maroc","Scotland":"Ecosse","Haiti":"Haiti","United States":"Etats-Unis","USA":"Etats-Unis","Australia":"Australie","Paraguay":"Paraguay","Turkiye":"Turquie","Germany":"Allemagne","Ivory Coast":"Cote Ivoire","Ecuador":"Equateur","Curacao":"Curacao","Netherlands":"Pays-Bas","Japan":"Japon","Sweden":"Suede","Tunisia":"Tunisie","Egypt":"Egypte","IR Iran":"Iran","Belgium":"Belgique","New Zealand":"N-Zelande","Spain":"Espagne","Uruguay":"Uruguay","Cape Verde":"Cap-Vert","Saudi Arabia":"Arabie Sao.","France":"France","Norway":"Norvege","Senegal":"Senegal","Iraq":"Iraq","Argentina":"Argentine","Austria":"Autriche","Algeria":"Algerie","Jordan":"Jordanie","Colombia":"Colombie","Portugal":"Portugal","Congo DR":"Congo RD","Uzbekistan":"Ouzbekistan","England":"Angleterre","Ghana":"Ghana","Croatia":"Croatie","Panama":"Panama","Korea Republic":"Coree S."}
          ABB={"Mexico":"MEX","South Africa":"RSA","South Korea":"KOR","Czechia":"CZE","Canada":"CAN","Switzerland":"SUI","Bosnia and Herzegovina":"BIH","Qatar":"QAT","Brazil":"BRA","Morocco":"MAR","Scotland":"SCO","Haiti":"HTI","United States":"USA","USA":"USA","Australia":"AUS","Paraguay":"PAR","Turkiye":"TUR","Germany":"GER","Ivory Coast":"CIV","Ecuador":"ECU","Curacao":"CUW","Netherlands":"NED","Japan":"JPN","Sweden":"SWE","Tunisia":"TUN","Egypt":"EGY","IR Iran":"IRN","Belgium":"BEL","New Zealand":"NZL","Spain":"ESP","Uruguay":"URU","Cape Verde":"CPV","Saudi Arabia":"KSA","France":"FRA","Norway":"NOR","Senegal":"SEN","Iraq":"IRQ","Argentina":"ARG","Austria":"AUT","Algeria":"DZA","Jordan":"JOR","Colombia":"COL","Portugal":"POR","Congo DR":"COD","Uzbekistan":"UZB","England":"ENG","Ghana":"GHA","Croatia":"CRO","Panama":"PAN","Korea Republic":"KOR"}
          try:
            r=urllib.request.urlopen("https://worldcup26.ir/get/games",timeout=10)
            raw=json.loads(r.read())
          except:
            print("failed");exit(0)
          items=raw if isinstance(raw,list) else raw.get("games",[])
          games=[];sm={}
          for m in items:
            g=m.get("group","")
            if not g or g in("R32","R16","QF","SF","F","3P"):continue
            h=m.get("home_team_name_en") or m.get("home_team_label") or m.get("home_team","")
            a=m.get("away_team_name_en") or m.get("away_team_label") or m.get("away_team","")
            if not h or not a:continue
            ha=ABB.get(h,h[:3].upper());aa=ABB.get(a,a[:3].upper())
            fin=str(m.get("finished","")).upper()=="TRUE"
            inp=str(m.get("time_elapsed","")).lower() not in("","notstarted","finished")
            status="final" if fin else("in_progress" if inp else "scheduled")
            sH=int(m.get("home_score",0) or 0);sA=int(m.get("away_score",0) or 0)
            try:
              dt=datetime.datetime.strptime(m.get("local_date",""),"%m/%d/%Y %H:%M")
              start=dt.strftime("%Y-%m-%dT%H:%M:%SZ")
            except:
              start=""
            el=m.get("time_elapsed","") if status=="in_progress" else ""
            games.append({"id":str(m.get("id","")),"status":status,"start":start,"home":ha,"away":aa,"homeN":FR.get(h,h),"awayN":FR.get(a,a),"group":g,"scoreH":sH,"scoreA":sA,"elapsed":el})
            if g not in sm:sm[g]={}
            for t,ab in[(h,ha),(a,aa)]:
              if ab not in sm[g]:sm[g][ab]={"a":ab,"n":FR.get(t,t),"g":g,"j":0,"v":0,"nul":0,"d":0,"pts":0}
            if fin:
              sm[g][ha]["j"]+=1;sm[g][aa]["j"]+=1
              if sH>sA:sm[g][ha]["v"]+=1;sm[g][ha]["pts"]+=3;sm[g][aa]["d"]+=1
              elif sA>sH:sm[g][aa]["v"]+=1;sm[g][aa]["pts"]+=3;sm[g][ha]["d"]+=1
              else:sm[g][ha]["nul"]+=1;sm[g][ha]["pts"]+=1;sm[g][aa]["nul"]+=1;sm[g][aa]["pts"]+=1
          st=[]
          for g in sorted(sm.keys()):
            ts=sorted(sm[g].values(),key=lambda x:-x["pts"])
            for i,t in enumerate(ts):t["r"]=i+1;st.append(t)
          now=datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          json.dump({"updated":now,"source":"worldcup26.ir","games":games,"standings":st},open("worldcup.json","w"),ensure_ascii=False)
          print(f"OK {len(games)} matchs")
          EOF
      - run: |
          git config user.name bot
          git config user.email bot@bot.com
          git add worldcup.json
          git diff --staged --quiet || (git commit -m "update" && git push)
