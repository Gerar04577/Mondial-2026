name: Update
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: curl -s https://worldcup26.ir/get/games -o g.json && cp g.json worldcup.json || true
      - run: |
          git config user.name bot
          git config user.email bot@bot.com
          git add worldcup.json
          git diff --staged --quiet || (git commit -m "update" && git push)
