name: Update
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - << 'EOF'
          import json, urllib.request, datetime

          FR={"Mexico":"Mexique","South Africa":"Afr. Sud","Korea Republic":"Coree S.","Czechia":"Tcheque","Czech Republic":"Tcheque","Canada":"Canada","Switzerland":"Suisse","Bosnia and Herzegovina":"Bosnie","Qatar":"Qatar","Brazil":"Bresil","Morocco":"Maroc","Scotland":"Ecosse","Haiti":"Haiti","United States":"Etats-Unis","Australia":"Australie","Paraguay":"Paraguay","Turkiye":"Turquie","Turkey":"Turquie","Germany":"Allemagne","Cote d'Ivoire":"Cote Ivoire","Ivory Coast":"Cote Ivoire","Ecuador":"Equateur","Curacao":"Curacao","Netherlands":"Pays-Bas","Japan":"Japon","Sweden":"Suede","Tunisia":"Tunisie","Egypt":"Egypte","IR Iran":"Iran","Iran":"Iran","Belgium":"Belgique","New Zealand":"N-Zelande","Spain":"Espagne","Uruguay":"Uruguay","Cape Verde":"Cap-Vert","Saudi Arabia":"Arabie Sao.","France":"France","Norway":"Norvege","Senegal":"Senegal","Iraq":"Iraq","Argentina":"Argentine","Austria":"Autriche","Algeria":"Algerie","Jordan":"Jordanie","Colombia":"Colombie","Portugal":"Portugal","Congo DR":"Congo RD","DR Congo":"Congo RD","Uzbekistan":"Ouzbekistan","England":"Angleterre","Ghana":"Ghana","Croatia":"Croatie","Panama":"Panama"}
          ABB={"Mexico":"MEX","South Africa":"RSA","Korea Republic":"KOR","Czechia":"CZE","Czech Republic":"CZE","Canada":"CAN","Switzerland":"SUI","Bosnia and Herzegovina":"BIH","Qatar":"QAT","Brazil":"BRA","Morocco":"MAR","Scotland":"SCO","Haiti":"HTI","United States":"USA","Australia":"AUS","Paraguay":"PAR","Turkiye":"TUR","Turkey":"TUR","Germany":"GER","Cote d'Ivoire":"CIV","Ivory Coast":"CIV","Ecuador":"ECU","Curacao":"CUW","Netherlands":"NED","Japan":"JPN","Sweden":"SWE","Tunisia":"TUN","Egypt":"EGY","IR Iran":"IRN","Iran":"IRN","Belgium":"BEL","New Zealand":"NZL","Spain":"ESP","Uruguay":"URU","Cape Verde":"CPV","Saudi Arabia":"KSA","France":"FRA","Norway":"NOR","Senegal":"SEN","Iraq":"IRQ","Argentina":"ARG","Austria":"AUT","Algeria":"DZA","Jordan":"JOR","Colombia":"COL","Portugal":"POR","Congo DR":"COD","DR Congo":"COD","Uzbekistan":"UZB","England":"ENG","Ghana":"GHA","Croatia":"CRO","Panama":"PAN"}

          def safe_int(v):
              try:
                  return int(v) if v not in (None,"null","","NULL") else 0
              except:
                  return 0

          # Normalise le nom pour matching
          def norm(n):
              return (n or "").lower().strip().replace("'","").replace("-","")

          # Etape 1: TheStatsAPI - horaires UTC fiables pour tous les 104 matchs
          fixtures = {}
          try:
              r = urllib.request.urlopen("https://www.thestatsapi.com/world-cup/data/fixtures.json", timeout=10)
              data = json.loads(r.read())
              for m in data.get("fixtures", []):
                  h = norm(m.get("homeTeam",""))
                  a = norm(m.get("awayTeam",""))
                  key = h + "__" + a
                  fixtures[key] = {
                      "start": m.get("kickoffUtc",""),
                      "group": m.get("group","")
                  }
              print(f"TheStatsAPI: {len(fixtures)} matchs charges")
          except Exception as e:
              print(f"TheStatsAPI failed: {e}")

          # Etape 2: worldcup26.ir - scores live et statuts
          try:
              r = urllib.request.urlopen("https://worldcup26.ir/get/games", timeout=10)
              raw = json.loads(r.read())
          except Exception as e:
              print(f"worldcup26.ir failed: {e}")
              exit(0)

          items = raw if isinstance(raw, list) else raw.get("games", [])
          games = []
          sm = {}

          for m in items:
              g = m.get("group","")
              if not g or g in ("R32","R16","QF","SF","F","3P"):
                  continue
              h = m.get("home_team_name_en") or m.get("home_team_label") or m.get("home_team","")
              a = m.get("away_team_name_en") or m.get("away_team_label") or m.get("away_team","")
              if not h or not a:
                  continue

              ha = ABB.get(h, h[:3].upper())
              aa = ABB.get(a, a[:3].upper())
              fin = str(m.get("finished","")).upper() == "TRUE"
              elapsed = str(m.get("time_elapsed","") or "")
              inp = elapsed.lower() not in ("","notstarted","finished")
              status = "final" if fin else ("in_progress" if inp else "scheduled")
              sH = safe_int(m.get("home_score"))
              sA = safe_int(m.get("away_score"))
              el = elapsed if status == "in_progress" else ""

              # Etape 3: correspondance par nom normalise
              key = norm(h) + "__" + norm(a)
              key_rev = norm(a) + "__" + norm(h)  # essai inverse si besoin
              fix = fixtures.get(key) or fixtures.get(key_rev)

              if fix:
                  start = fix["start"]  # UTC pur - index.html convertit en CEST
                  grp = fix["group"] or g
              else:
                  # Fallback: garder la date de worldcup26.ir
                  try:
                      dt = datetime.datetime.strptime(m.get("local_date",""), "%m/%d/%Y %H:%M")
                      start = dt.strftime("%Y-%m-%dT%H:%M:%SZ")
                  except:
                      start = ""
                  grp = g
                  print(f"No match for: {h} vs {a}")

              games.append({"id":str(m.get("id","")),"status":status,"start":start,"home":ha,"away":aa,"homeN":FR.get(h,h),"awayN":FR.get(a,a),"group":grp,"scoreH":sH,"scoreA":sA,"elapsed":el})

              if grp not in sm:
                  sm[grp] = {}
              for t, ab in [(h,ha),(a,aa)]:
                  if ab not in sm[grp]:
                      sm[grp][ab] = {"a":ab,"n":FR.get(t,t),"g":grp,"j":0,"v":0,"nul":0,"d":0,"pts":0}
              if fin:
                  sm[grp][ha]["j"]+=1; sm[grp][aa]["j"]+=1
                  if sH>sA: sm[grp][ha]["v"]+=1; sm[grp][ha]["pts"]+=3; sm[grp][aa]["d"]+=1
                  elif sA>sH: sm[grp][aa]["v"]+=1; sm[grp][aa]["pts"]+=3; sm[grp][ha]["d"]+=1
                  else: sm[grp][ha]["nul"]+=1; sm[grp][ha]["pts"]+=1; sm[grp][aa]["nul"]+=1; sm[grp][aa]["pts"]+=1

          st = []
          for grp in sorted(sm.keys()):
              ts = sorted(sm[grp].values(), key=lambda x: -x["pts"])
              for i,t in enumerate(ts):
                  t["r"] = i+1; st.append(t)

          now = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          out = {"updated":now,"source":"thestatsapi+worldcup26","games":games,"standings":st}
          with open("worldcup.json","w",encoding="utf-8") as f:
              json.dump(out,f,ensure_ascii=False)
          live = [g for g in games if g["status"]=="in_progress"]
          print(f"OK: {len(games)} matchs, {len(live)} en cours")
          EOF
      - run: |
          git config user.name bot
          git config user.email bot@bot.com
          git add worldcup.json
          git diff --staged --quiet || (git commit -m "update $(date -u +%H:%M)" && git push)
