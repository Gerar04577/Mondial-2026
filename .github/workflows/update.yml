name: Update
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - << 'EOF'
          import json, urllib.request, datetime, re

          ABB={"Mexico":"MEX","South Africa":"RSA","South Korea":"KOR","Czech Republic":"CZE","Canada":"CAN","Switzerland":"SUI","Bosnia-Herzegovina":"BIH","Qatar":"QAT","Brazil":"BRA","Morocco":"MAR","Scotland":"SCO","Haiti":"HTI","United States":"USA","Australia":"AUS","Paraguay":"PAR","Turkey":"TUR","Germany":"GER","Ivory Coast":"CIV","Ecuador":"ECU","Curacao":"CUW","Netherlands":"NED","Japan":"JPN","Sweden":"SWE","Tunisia":"TUN","Egypt":"EGY","Iran":"IRN","Belgium":"BEL","New Zealand":"NZL","Spain":"ESP","Uruguay":"URU","Cape Verde":"CPV","Saudi Arabia":"KSA","France":"FRA","Norway":"NOR","Senegal":"SEN","Iraq":"IRQ","Argentina":"ARG","Austria":"AUT","Algeria":"DZA","Jordan":"JOR","Colombia":"COL","Portugal":"POR","DR Congo":"COD","Uzbekistan":"UZB","England":"ENG","Ghana":"GHA","Croatia":"CRO","Panama":"PAN"}
          FR={"Mexico":"Mexique","South Africa":"Afr. Sud","South Korea":"Coree S.","Czech Republic":"Tcheque","Canada":"Canada","Switzerland":"Suisse","Bosnia-Herzegovina":"Bosnie","Qatar":"Qatar","Brazil":"Bresil","Morocco":"Maroc","Scotland":"Ecosse","Haiti":"Haiti","United States":"Etats-Unis","Australia":"Australie","Paraguay":"Paraguay","Turkey":"Turquie","Germany":"Allemagne","Ivory Coast":"Cote Ivoire","Ecuador":"Equateur","Curacao":"Curacao","Netherlands":"Pays-Bas","Japan":"Japon","Sweden":"Suede","Tunisia":"Tunisie","Egypt":"Egypte","Iran":"Iran","Belgium":"Belgique","New Zealand":"N-Zelande","Spain":"Espagne","Uruguay":"Uruguay","Cape Verde":"Cap-Vert","Saudi Arabia":"Arabie Sao.","France":"France","Norway":"Norvege","Senegal":"Senegal","Iraq":"Iraq","Argentina":"Argentine","Austria":"Autriche","Algeria":"Algerie","Jordan":"Jordanie","Colombia":"Colombie","Portugal":"Portugal","DR Congo":"Congo RD","Uzbekistan":"Ouzbekistan","England":"Angleterre","Ghana":"Ghana","Croatia":"Croatie","Panama":"Panama"}
          PHASE_FR={"Round of 32":"16es de finale","Round of 16":"8es de finale","Quarterfinals":"Quarts de finale","Semifinals":"Demi-finales","Third place":"Petite finale","Final":"Finale"}

          def parse_utc(date_str, time_str):
              if not time_str:
                  return date_str + "T00:00:00Z"
              m = re.match(r'(\d{2}):(\d{2})\s+UTC([+-]\d+)', time_str)
              if not m:
                  return date_str + "T00:00:00Z"
              h, mn, off = int(m.group(1)), int(m.group(2)), int(m.group(3))
              dt = datetime.datetime.strptime(date_str, "%Y-%m-%d").replace(hour=h, minute=mn)
              return (dt - datetime.timedelta(hours=off)).strftime("%Y-%m-%dT%H:%M:%SZ")

          try:
              url = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json"
              req = urllib.request.Request(url, headers={"User-Agent":"Mozilla/5.0"})
              raw = json.loads(urllib.request.urlopen(req, timeout=15).read())
          except Exception as e:
              print(f"openfootball failed: {e}"); exit(0)

          matches = raw.get("matches", [])
          print(f"openfootball: {len(matches)} matchs")

          games = []
          sm = {}

          for m in matches:
              h = m.get("team1")
              a = m.get("team2")
              grp_raw = m.get("group", "")
              round_raw = m.get("round", "")

              # Groupe: "Group A" -> "A"
              grp = ""
              if grp_raw and "Group" in grp_raw:
                  g = grp_raw.replace("Group ", "").strip()[:1]
                  if g.isalpha():
                      grp = g

              # Phase
              phase = PHASE_FR.get(round_raw, round_raw) if round_raw else ("Groupes" if grp else "")

              # Equipes
              if not h or not a:
                  ha, aa, hFR, aFR = "TBD", "TBD", "A determiner", "A determiner"
              else:
                  ha = ABB.get(h, h[:3].upper())
                  aa = ABB.get(a, a[:3].upper())
                  hFR = FR.get(h, h)
                  aFR = FR.get(a, a)

              # Heure UTC
              start = parse_utc(m.get("date", ""), m.get("time", ""))

              # Score et statut
              score = m.get("score")
              if score and score.get("ft"):
                  status = "final"
                  sH, sA = score["ft"][0], score["ft"][1]
              else:
                  status = "scheduled"
                  sH, sA = 0, 0

              games.append({"id":str(len(games)+1),"status":status,"start":start,"home":ha,"away":aa,"homeN":hFR,"awayN":aFR,"group":grp,"phase":phase,"scoreH":sH,"scoreA":sA,"elapsed":""})

              # Classements phase de groupes uniquement
              if grp and status == "final" and ha != "TBD":
                  if grp not in sm: sm[grp] = {}
                  for t, ab, fn in [(h,ha,hFR),(a,aa,aFR)]:
                      if ab not in sm[grp]:
                          sm[grp][ab] = {"a":ab,"n":fn,"g":grp,"j":0,"v":0,"nul":0,"d":0,"pts":0}
                  sm[grp][ha]["j"]+=1; sm[grp][aa]["j"]+=1
                  if sH>sA: sm[grp][ha]["v"]+=1; sm[grp][ha]["pts"]+=3; sm[grp][aa]["d"]+=1
                  elif sA>sH: sm[grp][aa]["v"]+=1; sm[grp][aa]["pts"]+=3; sm[grp][ha]["d"]+=1
                  else: sm[grp][ha]["nul"]+=1; sm[grp][ha]["pts"]+=1; sm[grp][aa]["nul"]+=1; sm[grp][aa]["pts"]+=1

          st = []
          for grp in sorted(sm.keys()):
              ts = sorted(sm[grp].values(), key=lambda x:-x["pts"])
              for i,t in enumerate(ts):
                  t["r"]=i+1; st.append(t)

          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          grp_g = [g for g in games if g["group"]]
          ko_g = [g for g in games if not g["group"]]
          out = {"updated":now,"source":"openfootball","games":games,"standings":st}
          with open("worldcup.json","w",encoding="utf-8") as f:
              json.dump(out,f,ensure_ascii=False)
          print(f"OK: {len(grp_g)} groupe + {len(ko_g)} KO, {len(st)} equipes classement")
          EOF
      - run: |
          git config user.name bot
          git config user.email bot@bot.com
          git add worldcup.json
          git diff --staged --quiet || (git commit -m "update $(date -u +%H:%M)" && git push)
