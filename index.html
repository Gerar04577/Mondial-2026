<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Mondial 2026</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a3d1f;color:#f5f5f0;font-family:Inter,sans-serif;min-height:100vh;}
:root{--gold:#e8b84b;--grey:#a8a89e;--card:#0f1a0f;--card2:#141f14;--red:#e84b4b;--green:#4be87a;--bel:#ed2939;}
.header{background:linear-gradient(135deg,#000 0%,#0a3d1f 60%,#0d5229 100%);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100;}
.header-top{text-align:center;padding:12px 12px 6px;}
.header-top h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:4px;color:var(--gold);line-height:1;}
.header-top p{color:var(--grey);font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.update-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;}
.update-info{font-size:0.62rem;color:var(--grey);}
.btn-refresh{background:rgba(232,184,75,0.15);border:1px solid rgba(232,184,75,0.5);border-radius:20px;padding:4px 14px;color:var(--gold);font-size:0.72rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.btn-refresh:disabled{opacity:0.5;}
.spin{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.tabs{display:flex;overflow-x:auto;border-top:1px solid rgba(232,184,75,0.15);}
.tab{flex:0 0 auto;padding:9px 14px;border:none;background:transparent;color:var(--grey);border-bottom:3px solid transparent;font-weight:600;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;white-space:nowrap;}
.tab.active{color:var(--gold);border-bottom:3px solid var(--gold);}
.main{max-width:700px;margin:0 auto;padding:0 12px 50px;}
.section{display:none;}.section.active{display:block;}
.card{background:var(--card);border:1px solid rgba(232,184,75,0.15);border-radius:10px;margin-bottom:12px;overflow:hidden;}
.card.bel{border-color:rgba(237,41,57,0.5);}
.card-title{background:var(--card2);padding:7px 14px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--gold);border-bottom:1px solid rgba(232,184,75,0.12);}
.card-title.bel{color:var(--bel);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0;}
.stat{background:var(--card);border:1px solid rgba(232,184,75,0.15);border-radius:10px;padding:10px 6px;text-align:center;}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;color:var(--gold);line-height:1;}
.stat-l{font-size:0.58rem;color:var(--grey);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.match{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.05);}
.match:last-child{border-bottom:none;}
.match.bel-m{background:rgba(237,41,57,0.05);border-left:3px solid var(--bel);}
.match:not(.bel-m){border-left:3px solid transparent;}
.mh{flex:1;font-weight:500;font-size:0.85rem;}
.ma{flex:1;text-align:right;font-weight:500;font-size:0.85rem;}
.mh.w,.ma.w{font-weight:700;}
.mh.l,.ma.l{opacity:0.5;}
.ms{min-width:76px;text-align:center;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--gold);letter-spacing:2px;}
.vs{color:var(--grey);font-size:0.7rem;font-weight:600;}
.mt{min-width:72px;text-align:right;margin-left:8px;}
.mg{font-size:0.6rem;color:var(--grey);}
.mhr{font-size:0.82rem;font-weight:600;color:#f5f5f0;}
.standings{width:100%;border-collapse:collapse;font-size:0.82rem;}
.standings thead tr{background:var(--card2);color:var(--grey);font-size:0.6rem;text-transform:uppercase;}
.standings th{padding:6px 4px;text-align:center;}
.standings th:first-child{padding:6px 10px;text-align:left;}
.standings td{padding:8px 4px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);}
.standings td:first-child{padding:8px 10px;text-align:left;font-weight:600;}
.standings tr.br{background:rgba(237,41,57,0.08);}
.standings tr.br td:first-child{color:var(--bel);}
.rb{display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;border-radius:50%;font-size:0.62rem;font-weight:700;margin-right:6px;}
.r1{background:var(--gold);color:#000;}.r2{background:rgba(232,184,75,0.3);color:var(--gold);}.r3,.r4{background:rgba(255,255,255,0.1);color:var(--grey);}
.vc{color:var(--green);}.dc{color:var(--red);}.pc{color:var(--gold);font-weight:700;font-size:0.95rem;}
.grp-nav{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 10px;}
.grp-btn{padding:4px 11px;border-radius:20px;border:1px solid rgba(232,184,75,0.3);background:transparent;color:var(--grey);font-size:0.7rem;font-weight:600;cursor:pointer;}
.grp-btn.active{background:var(--gold);color:#000;border-color:var(--gold);}
.dsep{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:3px;color:var(--grey);padding:14px 0 6px;text-transform:uppercase;}
.upm{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.05);}
.upm:last-child{border-bottom:none;}
.upi{display:flex;align-items:center;gap:8px;}
.upt{flex:1;}.upt.r{text-align:right;}
.un{font-weight:600;font-size:0.85rem;}
.pb{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:4px;overflow:hidden;}
.pf{height:100%;background:var(--gold);border-radius:2px;}
.pp{font-size:0.62rem;color:var(--grey);margin-top:2px;}
.pp.r{text-align:right;}
.upc{text-align:center;min-width:64px;}
.ucg{font-size:0.58rem;color:var(--grey);}
.uch{font-weight:700;color:#f5f5f0;font-size:0.88rem;}
.ucd{font-size:0.6rem;color:var(--grey);}
.info-box{background:rgba(232,184,75,0.08);border:1px solid rgba(232,184,75,0.2);border-radius:8px;padding:9px 14px;margin:14px 0;font-size:0.76rem;color:var(--grey);text-align:center;}
.psep{display:flex;align-items:center;gap:10px;padding:16px 0 5px;}
.pl{flex:1;height:1px;background:rgba(232,184,75,0.2);}
.pt{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;color:var(--gold);}
.pd{font-size:0.63rem;color:var(--grey);text-align:center;letter-spacing:1px;margin-bottom:10px;}
.bg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px;}
.tbd{background:var(--card);border:1px dashed rgba(232,184,75,0.2);border-radius:8px;overflow:hidden;opacity:0.75;}
.tbdh{background:var(--card2);padding:3px 10px;font-size:0.58rem;color:var(--grey);display:flex;justify-content:space-between;}
.tbdt{padding:7px 10px;font-size:0.76rem;color:var(--grey);font-style:italic;}
.tbdt+.tbdt{border-top:1px solid rgba(255,255,255,0.04);}
.fw{max-width:380px;margin:0 auto 8px;}
.fc{background:var(--card);border:2px solid rgba(232,184,75,0.5);border-radius:8px;overflow:hidden;}
.fh{background:rgba(232,184,75,0.15);padding:4px 10px;font-size:0.6rem;color:var(--gold);letter-spacing:1px;display:flex;justify-content:space-between;}
.ft{padding:14px 12px;font-size:0.9rem;color:var(--grey);font-style:italic;}
.ft+.ft{border-top:1px solid rgba(255,255,255,0.05);}
.trophy{text-align:center;font-size:3rem;padding:20px;}
.fl{display:flex;align-items:center;gap:10px;padding:18px 0 6px;}
.fll{flex:1;height:1px;background:rgba(232,184,75,0.4);}
.flb{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:#fff;}
.fi{font-size:0.67rem;color:var(--grey);text-align:center;letter-spacing:1px;margin-bottom:10px;}
.err{background:rgba(232,75,75,0.15);border:1px solid rgba(232,75,75,0.4);border-radius:8px;padding:8px 14px;margin:12px 0;font-size:0.78rem;color:var(--red);text-align:center;}
.loading{text-align:center;padding:40px;color:var(--grey);}
@media(max-width:400px){.bg{grid-template-columns:1fr;}.stats{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Mondial 2026</h1>
    <p>USA &middot; Canada &middot; Mexique</p>
    <div class="update-bar">
      <span class="update-info" id="updateInfo">Chargement...</span>
      <button class="btn-refresh" id="btnRefresh" onclick="loadData()">
        <span id="refreshIcon">&#8635;</span> Mettre à jour
      </button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('accueil',this)">&#127968; Accueil</button>
    <button class="tab" onclick="showTab('resultats',this)">Résultats</button>
    <button class="tab" onclick="showTab('groupes',this)">Groupes</button>
    <button class="tab" onclick="showTab('avenir',this)">À venir</button>
    <button class="tab" onclick="showTab('tableau',this)">Tableau</button>
  </div>
</div>

<div class="main">
  <div id="accueil" class="section active"><div class="loading">&#9917; Chargement des données...</div></div>
  <div id="resultats" class="section"><div class="loading">&#9917; Chargement...</div></div>
  <div id="groupes" class="section"><div class="loading">&#9917; Chargement...</div></div>
  <div id="avenir" class="section"><div class="loading">&#9917; Chargement...</div></div>
  <div id="tableau" class="section"></div>
</div>

var allMatches = [];

var activeGrp = 'ALL';

function fr(n){ return NAMES_FR[n]||n; }
function flag(n){ return FLAGS[n]||'🏳️'; }

function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  if(btn) btn.classList.add('active');
  currentTab = id;
  renderTab(id);
}

function loadData() {
  var btn = document.getElementById('btnRefresh');
  var icon = document.getElementById('refreshIcon');
  var info = document.getElementById('updateInfo');
  btn.disabled = true;
  icon.className = 'spin';
  icon.innerHTML = '&#8635;';
  info.textContent = 'Mise à jour...';

  // Tentative API - si indisponible, bascule immédiate sur les données fixes
  var url = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
  var proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);

  fetch(proxy)
    .then(function(r){ return r.json(); })
    .then(function(data){
      // Traitement dynamique si l'API est à jour, sinon fallback sécurisé
      if (data && data.matches && data.matches.length > 0) {
        processAPIData(data);
        var now = new Date();
        info.textContent = 'Mis à jour ' + now.toLocaleTimeString('fr-BE',{hour:'2-digit',minute:'2-digit'});
        btn.disabled = false;
        icon.className = '';
        renderTab(currentTab);
      } else {
        loadFallback();
      }
    })
    .catch(function(e){
      loadFallback();
    });
}

function processAPIData(data) {
  allMatches = [];
  allStandings = {};
  var groups = {};

  data.matches.forEach(function(m){
    if(!m.group) return;
    var g = m.group.replace('Group ','');
    if(!groups[g]) groups[g] = {};
    [m.team1, m.team2].forEach(function(t){
      if(!groups[g][t]) groups[g][t] = {n:t,j:0,v:0,nul:0,d:0,pts:0};
    });
    if(m.score && m.score.ft) {
      var s1 = m.score.ft[0], s2 = m.score.ft[1];
      groups[g][m.team1].j++; groups[g][m.team2].j++;
      if(s1>s2){ groups[g][m.team1].v++; groups[g][m.team1].pts+=3; groups[g][m.team2].d++; }
      else if(s2>s1){ groups[g][m.team2].v++; groups[g][m.team2].pts+=3; groups[g][m.team1].d++; }
      else { groups[g][m.team1].nul++; groups[g][m.team1].pts++; groups[g][m.team2].nul++; groups[g][m.team2].pts++; }
    }
    
    // Pour l'API on applique un ID de tri générique
    var isFinished = !!(m.score && m.score.ft);
    allMatches.push({
      sortId: new Date(m.date).getTime(),
      dateLabel: new Date(m.date).toLocaleDateString('fr-BE', {weekday:'long', day:'numeric', month:'long'}),
      dateShort: m.date.split('-').reverse().slice(0,2).join('/'),
      timeLabel: m.time || '--:--',
      home: m.team1,
      away: m.team2,
      group: g,
      status: isFinished ? 'final' : 'scheduled',
      scoreH: isFinished ? m.score.ft[0] : null,
      scoreA: isFinished ? m.score.ft[1] : null,
    });
  });

  allMatches.sort(function(a,b){ return a.sortId - b.sortId; });
  buildStandings(groups);
}

  allMatches.forEach(function(m){
    var g = m.group;
    if(!groups[g]) groups[g]={};
    [m.home,m.away].forEach(function(t){
      if(!groups[g][t]) groups[g][t]={n:t,j:0,v:0,nul:0,d:0,pts:0};
    });
    if(m.status==='final'){
      groups[g][m.home].j++; groups[g][m.away].j++;
      if(m.scoreH>m.scoreA){groups[g][m.home].v++;groups[g][m.home].pts+=3;groups[g][m.away].d++;}
      else if(m.scoreA>m.scoreH){groups[g][m.away].v++;groups[g][m.away].pts+=3;groups[g][m.home].d++;}
      else{groups[g][m.home].nul++;groups[g][m.home].pts++;groups[g][m.away].nul++;groups[g][m.away].pts++;}
    }
  });
  buildStandings(groups);

  document.getElementById('updateInfo').textContent = 'Données intégrées (Heure Belge)';
  var btn = document.getElementById('btnRefresh');
  var icon = document.getElementById('refreshIcon');
  btn.disabled = false;
  icon.className = '';
  renderTab(currentTab);
}

function buildStandings(groups) {
  allStandings = {};
  Object.keys(groups).forEach(function(g){
    var t = Object.values(groups[g]);
    t.sort(function(a,b){ return b.pts - a.pts; });
    allStandings[g] = t.map(function(item,i){ return Object.assign({r:i+1},item); });
  });
}

function matchRow(m) {
  var done = m.status==='final';
  var isBel = m.home==='Belgium'||m.away==='Belgium';
  var hW = done && m.scoreH>m.scoreA;
  var aW = done && m.scoreA>m.scoreH;
  var cls = isBel ? ' class="match bel-m"' : ' class="match"';
  var hc = hW?'mh w':aW?'mh l':'mh';
  var ac = aW?'ma w':hW?'ma l':'ma';
  var sc = done ? '<span class="sv">'+m.scoreH+' - '+m.scoreA+'</span>' : '<span class="vs">VS</span>';

  return '<div'+cls+'>'
    +'<span class="'+hc+'">'+flag(m.home)+' '+fr(m.home)+'</span>'
    +'<div class="ms">'+sc+'</div>'
    +'<span class="'+ac+'">'+fr(m.away)+' '+flag(m.away)+'</span>'
    +'<div class="mt"><div class="mg">Grp '+m.group+' '+m.dateShort+'</div><div class="mhr">'+m.timeLabel+'</div></div>'
    +'</div>';
}

function standingsTable(teams) {
  var h = '<table class="standings"><thead><tr><th style="text-align:left">Équipe</th><th>J</th><th class="vc">V</th><th>N</th><th class="dc">D</th><th class="pc">Pts</th></tr></thead><tbody>';
  teams.forEach(function(t){
    var bel = t.n==='Belgium'?'br':'';
    var bc = 'r'+t.r;
    h += '<tr class="'+bel+'"><td><span class="rb '+bc+'">'+t.r+'</span>'+flag(t.n)+' '+fr(t.n)+'</td>';
    h += '<td>'+t.j+'</td><td class="vc">'+t.v+'</td><td>'+t.nul+'</td><td class="dc">'+t.d+'</td><td class="pc">'+t.pts+'</td></tr>';
  });
  return h+'</tbody></table>';
}

function renderTab(id) {
  if(id==='accueil') renderAccueil();
  else if(id==='resultats') renderResultats();
  else if(id==='groupes') renderGroupes(activeGrp);
  else if(id==='avenir') renderAvenir();
  else if(id==='tableau') renderTableau();
}

function renderAccueil() {
  var finished = allMatches.filter(function(m){return m.status==='final';});
  var upcoming = allMatches.filter(function(m){return m.status==='scheduled';}).slice(0,5);
  var belG = allStandings['G']||[];
  var totalFinished = finished.length;
  
  var recent = finished.slice(-6).reverse();

  var html = '<div class="stats">';
  html += '<div class="stat"><div class="stat-n">'+totalFinished+'</div><div class="stat-l">Joués</div></div>';
  html += '<div class="stat"><div class="stat-n">12</div><div class="stat-l">Groupes</div></div>';
  html += '<div class="stat"><div class="stat-n">48</div><div class="stat-l">Nations</div></div>';
  html += '<div class="stat"><div class="stat-n" style="font-family:Inter,sans-serif;font-size:1.6rem">🇧🇪</div><div class="stat-l">Grp G</div></div>';
  html += '</div>';

  if(belG.length) {
    html += '<div class="card bel"><div class="card-title bel">🇧🇪 Belgique &mdash; Groupe G</div>'+standingsTable(belG)+'</div>';
  }

  html += '<div class="card"><div class="card-title">Derniers résultats</div>';
  recent.forEach(function(m){ html += matchRow(m); });
  html += '</div>';

  html += '<div class="card"><div class="card-title">Prochains matchs</div>';
  if(upcoming.length) upcoming.forEach(function(m){ html += matchRow(m); });
  else html += '<div style="padding:14px;color:var(--grey);text-align:center">Aucun match programmé</div>';
  html += '</div>';

  document.getElementById('accueil').innerHTML = html;
}

function renderResultats() {
  var finished = allMatches.filter(function(m){return m.status==='final';});
  
  // Groupement par libellé textuel de journée en conservant l'ordre chronologique strict
  var byDate = {};
  var dateOrder = [];

  finished.forEach(function(m){
    var d = m.dateLabel;
    if(!byDate[d]) {
      byDate[d] = [];
      dateOrder.push(d);
    }
    byDate[d].push(m);
  });
  
  // Journées de la plus récente (en haut) à la plus ancienne (en bas)
  dateOrder.reverse();
  
  var html = '';
  dateOrder.forEach(function(d){
    html += '<div class="dsep">'+d+'</div><div class="card">';
    // Au sein d'une journée, les matchs sont classés dans l'ordre de déroulement (du matin au soir)
    byDate[d].forEach(function(m){ html += matchRow(m); });
    html += '</div>';
  });
  if(!html) html = '<div style="padding:30px;text-align:center;color:var(--grey)">Aucun résultat</div>';
  document.getElementById('resultats').innerHTML = html;
}

function renderGroupes(filter) {
  activeGrp = filter;
  var groups = Object.keys(allStandings).sort();
  var shown = filter==='ALL' ? groups : [filter];

  var nav = '<div class="grp-nav">';
  nav += '<button class="grp-btn'+(filter==='ALL'?' active':'')+'" onclick="renderGroupes(\'ALL\');updateGrpBtns(this)">Tous</button>';
  groups.forEach(function(g){
    nav += '<button class="grp-btn'+(filter===g?' active':'')+'" onclick="renderGroupes(\''+g+'\');updateGrpBtns(this)">Grp '+g+'</button>';
  });
  nav += '</div>';

  var html = nav;
  shown.forEach(function(g){
    var teams = allStandings[g]||[];
    html += '<div class="card"><div class="card-title">Groupe '+g+'</div>'+standingsTable(teams)+'</div>';
  });
  document.getElementById('groupes').innerHTML = html;
}

function updateGrpBtns(btn) {
  document.querySelectorAll('.grp-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

function renderAvenir() {
  var upcoming = allMatches.filter(function(m){return m.status==='scheduled';});
  
  var byDate = {};
  var dateOrder = [];

  upcoming.forEach(function(m){
    var d = m.dateLabel;
    if(!byDate[d]) {
      byDate[d] = [];
      dateOrder.push(d);
    }
    byDate[d].push(m);
  });
  
  var html = '';
  dateOrder.forEach(function(d){
    html += '<div class="dsep">'+d+'</div><div class="card">';
    byDate[d].forEach(function(m){
      html += matchRow(m);
    });
    html += '</div>';
  });
  if(!html) html = '<div style="padding:30px;text-align:center;color:var(--grey)">Aucun match programmé</div>';
  document.getElementById('avenir').innerHTML = html;
}

setInterval(loadData, 60 * 60 * 1000);
loadData();
